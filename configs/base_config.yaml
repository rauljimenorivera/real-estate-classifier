project_name: real-estate-classifier
entity: rauljr  # cambiar por el del equipo

data:
  data_dir: data/processed
  raw_training_dir: data/raw/dataset/training
  raw_validation_dir: data/raw/dataset/validation
  num_classes: 15
  image_size: 224
  batch_size: 32
  num_workers: 4
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

model:
  backbone: efficientnet_b0  # opciones: resnet50, efficientnet_b2, vit_small_patch16_224
  pretrained: true
  dropout: 0.3
  freeze_backbone: false

training:
  epochs: 30
  learning_rate: 1e-4
  weight_decay: 1e-4
  seed: 42
  save_dir: artifacts
  scheduler: cosine  # opciones: cosine, step, none
  early_stopping_patience: 5

hardware:
  device: cuda  # cuda o cpu
  mixed_precision: true